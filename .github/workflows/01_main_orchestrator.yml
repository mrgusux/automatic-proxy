name: 01 - Main Orchestrator

on:
  schedule:
    - cron: '47 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: proxy-collector-main
  cancel-in-progress: false

jobs:
  collect:
    name: Collect, validate and export proxies
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download GeoIP databases
        run: |
          mkdir -p data/geoip
          curl -sL --max-time 30 "https://cdn.jsdelivr.net/gh/P3TERX/GeoLite.mmdb@main/GeoLite2-City.mmdb" -o data/geoip/GeoLite2-City.mmdb || true
          curl -sL --max-time 30 "https://cdn.jsdelivr.net/gh/P3TERX/GeoLite.mmdb@main/GeoLite2-Country.mmdb" -o data/geoip/GeoLite2-Country.mmdb || true
          curl -sL --max-time 30 "https://cdn.jsdelivr.net/gh/P3TERX/GeoLite.mmdb@main/GeoLite2-ASN.mmdb" -o data/geoip/GeoLite2-ASN.mmdb || true

      - name: Run collector pipeline
        run: python -m src.main run --log-level INFO

      - name: Commit and push updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/
          if git diff --staged --quiet; then
            echo "No proxy changes to commit."
          else
            git commit -m "chore(data): update proxy lists [skip ci]"
            git pull --rebase origin main
            git push
          fi
