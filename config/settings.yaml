# Core system configuration.
# All values are read by src/utils/config_loader.py into the Settings model.

# Concurrency limits.
scrape_concurrency: 100
validate_concurrency: 1000

# Timeouts (seconds).
scrape_timeout: 15.0
tcp_timeout: 3.0
validate_timeout: 8.0

# Retry policy.
max_retries: 2
retry_backoff: 0.3

# Token-bucket rate limiting (prevents IP bans).
rate_limit_per_sec: 40.0
rate_limit_burst: 80

# Validation thresholds.
max_latency_ms: 8000.0

# Output.
max_alive_output: 50000
output_dir: outputs

# GeoIP / cache paths.
geoip_country_db: data/geoip/GeoLite2-Country.mmdb
geoip_city_db: data/geoip/GeoLite2-City.mmdb
geoip_asn_db: data/geoip/GeoLite2-ASN.mmdb
geo_cache_file: data/cache/geolocation_cache.json
country_mapping_file: config/country_mapping.json

# Validation rules.
validation_rules_file: config/validation_rules.yaml

# Enrichment toggles.
enable_blacklist_check: true
enable_asn_resolution: true
