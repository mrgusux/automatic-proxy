# Central registry of public proxy sources.
# scraper_type: one of html_table | json_api | github_raw | regex_text
#
# Every source listed here publishes FREELY and PUBLICLY shared proxy lists.
# Sources are grouped by provider. Disable any source by setting `enabled: false`.
# Add new ones with: python scripts/add_new_source.py

sources:
  # ------------------------------------------------------------------
  # ProxyScrape API (HTTP / SOCKS4 / SOCKS5)
  # ------------------------------------------------------------------
  - name: proxyscrape_http
    url: https://api.proxyscrape.com/v2/?request=getproxies&protocol=http&timeout=10000&country=all
    scraper_type: regex_text
    default_protocol: http
    enabled: true

  - name: proxyscrape_socks4
    url: https://api.proxyscrape.com/v2/?request=getproxies&protocol=socks4&timeout=10000
    scraper_type: regex_text
    default_protocol: socks4
    enabled: true

  - name: proxyscrape_socks5
    url: https://api.proxyscrape.com/v2/?request=getproxies&protocol=socks5&timeout=10000
    scraper_type: regex_text
    default_protocol: socks5
    enabled: true

  - name: proxyscrape_all_v4
    url: https://api.proxyscrape.com/v4/free-proxy-list/get?request=display_proxies&proxy_format=ipport&format=text
    scraper_type: regex_text
    default_protocol: http
    enabled: true

